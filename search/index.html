                        {
                          "title"    : "Pluggable Authentication Modules",
                          "category" : "",
                          "tags"     : " Linux, PAM, Biometrics, FaceRecognition, Security, sudo, IR",
                          "url"      : "/2026/06/27/linux-pam.html",
                          "date"     : "June 27, 2026",
                          "excerpt"  : "Part 1 of a short series: PAM module, integration, and API. Next: face-recognition pipeline.I’m a software engineer and have used Linux on my personal and work machines for years. I’m a bit obsessed with security and prefer strong passwords, but t...",
                          "content"  : "Part 1 of a short series: PAM module, integration, and API. Next: face-recognition pipeline.I’m a software engineer and have used Linux on my personal and work machines for years. I’m a bit obsessed with security and prefer strong passwords, but typing sudo passwords repeatedly is tedious. My laptop’s webcam also exposes an IR stream useful for liveness checks, so I decided to prototype authorizing sudo with a local face-verification flow. There are few off-the-shelf solutions (Howdy, Biopass), but I enjoy learning and building—so I implemented a solution that:  Uses deep learning  Combines classic vision-based approaches  Checks liveness using an IR feed  Ensembles signals to decide whether the face is enrolledIn this article I explain how Linux can support this use case — it is not a trivial problem and requires careful attention for face recognition and identification. I didn’t train any deep models; instead I used a YOLO-based face detector. Let’s start with the system side of the problem.Pluggable Authentication Modules  PAM is a system of libraries that handle authentication tasks for applications (services) on the system. The library provides a stable interface (API) that privilege-granting programs defer to in order to perform standard authentication tasks1.Linux uses PAM (pluggable authentication modules) as a layer that communicates between user and application during the authentication process2. PAM separates the tasks of authentication from applications. PAM are available in the system and can be used by any application.Application developer would have to write the authentication checks for each new method without PAM. A call to PAM libraries leaves the checks to authentication experts and makes the application developer life easier.PAM authentication consists of three layers3:  Top layers: PAM aware applications/services like gdm, sshd, sudo, login, su and etc. They just call libpam.so and say “authenticate this user.” The actual logic is entirely someone else’s problem.  Middle layer: PAM core is the broker. It reads the per-service config file in /etc/pam.d/ (e.g. /etc/pam.d/sudo), figures out which modules to call and in what order, and applies the stacking rules (required, sufficient, optional, etc.). This is where policy lives — completely separate from both the application and the authentication backend.  Bottom layer: PAM modules are the authentication experts. Each one knows exactly one thing: how to check a Unix password, how to talk to a fingerprint daemon, how to do a Kerberos ticket exchange. They don’t know or care which application triggered them.Each configuration file (Layer-2) for PAM-aware applications contains a group of directives that define the module and any controls or arguments with it4,5.The format of each rule is a space separated collection of tokens:  service type control module-path module-argumentsThe syntax of files contained in the /etc/pam.d/ directory, are identical except for the absence of any service field. In this case, the service is the name of the file in the /etc/pam.d/  directory. This filename must be in lower case.Type  account: performs non-authentication based account management. It is typically used to restrict/permit access to a service based on the time of day, currently available system resources (maximum number of users) or perhaps the location of the applicant user – ‘root’ login only on the console.  auth: provides two aspects of authenticating the user:          Establishes that the user is who they claim to be, by instructing the application to prompt the user for a password or other means of identification.      Grant group membership or other privileges through its credential granting properties.        password: is required for updating the authentication token associated with the user. Typically, there is one module each ‘challenge/response’ based authentication (auth) type.  session: associated with doing things that need to be done for the user before/after they can be given service. Such things include the logging of information concerning the opening/closing of some data exchange with a user, mounting directories, etc.Control  required: failure of such a PAM will ultimately lead to the PAM-API returning failure but only after the remaining stacked modules (for this service and type) have been invoked.  requisite like required, however, in the case that such a module returns a failure, control is directly returned to the application or to the superior PAM stack.  sufficient: if such a module succeeds and no prior required module has failed the PAM framework returns success to the application or to the superior PAM stack immediately without calling any further modules in the stack.  optional: the success or failure of this module is only important if it is the only module in the stack associated with this service+type.  include: include all lines of given type from the configuration file specified as an argument to this control.  substack: include all lines of given type from the configuration file specified as an argument to this control.For the more complicated syntax valid control values check 5.Module Pathmodule-path (shared object) is either the full filename of the PAM to be used by the application (it begins with a ‘/’), or a relative pathname from the default module location: /lib/security/ or /lib64/security/, depending on the architecture.Module Argumentsmodule-arguments are a space separated list of tokens that can be used to modify the specific behavior of the given PAM. Such arguments will be documented for each individual module.Sample configuration fileLet’s now inspect a sample configuration file:➜  ~ cat /etc/pam.d/sudo#%PAM-1.0 #(1)# Set up user limits from /etc/security/limits.conf.session    required   pam_limits.so #(2)session    required   pam_env.so readenv=1 user_readenv=0 #(3)session    required   pam_env.so readenv=1 envfile=/etc/default/locale user_readenv=0 #(4)@include common-auth #(5)@include common-account #(6)@include common-session-noninteractive #(7)session    optional    pam_xauth.so #(8)  A magic comment that tells the PAM library this file follows the PAM 1.0 config syntax. Not functional, but required by convention.  Enforces the resource limits defined in /etc/security/limits.conf (max open files, max processes, CPU time, etc.) for the sudo session. required means it must succeed — if it fails, the whole stack fails.  Loads environment variables from /etc/environment (the system-wide env file). readenv=1 enables reading it; user_readenv=0 means it does not read the user’s ~/.pam_environment. This sets things like PATH, LANG, etc. for the elevated session.  Same module, second pass — but this time reads specifically from /etc/default/locale. This is a Debian/Ubuntu convention for storing locale variables (LANG, LC_ALL, LC_MESSAGES). Running pam_env.so twice is intentional: one call for general env, one for locale.  Pulls in /etc/pam.d/common-auth verbatim. On Debian/Ubuntu this is where the actual authentication logic lives — typically pam_unix.so for password checking, and where you’d insert Howdy or Biopass for face recognition (in this article’s context replace it with the shared object that handles the face recognition). The @include keeps individual service configs DRY.  Pulls in /etc/pam.d/common-account. Handles account validation after auth succeeds — checking whether the account is expired, locked, or restricted by time of day (pam_unix.so account type, pam_time.so, etc.). Auth can succeed but account checks can still deny access.  Pulls in /etc/pam.d/common-session-noninteractive. Runs session setup modules that are safe for non-interactive use (no terminal required). Things like pam_umask.so for setting the file creation mask. Notably this is the non-interactive variant — sudo doesn’t open a login shell so it skips things like MOTD printing.  Transfers the user’s X11 authentication cookie (.Xauthority) into the elevated session so GUI applications launched via sudo can connect to the display. optional means if this fails (e.g. you’re on a headless server with no X), sudo still works fine — it’s non-fatal.My plan is to first try to authenticate via my custom shared object; in case of failure or unavailability, fall back to pam_unix.so via common-auth:  Before you proceed: if you are following along and have already modified /etc/pam.d/sudo, keep a root shell open in a separate terminal at all times while working through the next part. A bug in pam_sm_authenticate will cause PAM_AUTH_ERR on every call, which means sudo will fall back to the password prompt — but a crash or a missing .so file can behave less gracefully depending on your distribution. The safety net costs nothing and has saved this author more than once.#%PAM-1.0# Set up user limits from /etc/security/limits.conf.session    required     pam_limits.sosession    required     pam_env.so readenv=1 user_readenv=0session    required     pam_env.so readenv=1 envfile=/etc/default/locale user_readenv=0auth       sufficient   pam_faceverify.so #This will be my shared object@include common-auth@include common-account@include common-session-noninteractivesession    optional     pam_xauth.soPAM APIflowchart TD    A([sudo invoked]) --&gt; B    subgraph L1 [Layer 1 — application]      B[sudo calls libpam.so]    end    B --&gt; C    subgraph L2 [Layer 2 — PAM core]      C[reads /etc/pam.d/sudo]      C --&gt; D[finds: auth sufficient pam_faceverify.so]    end    D --&gt; E    subgraph L3 [Layer 3 — modules]      E[pam_sm_authenticate runs]      E --&gt; F{result?}      F --&gt;|PAM_SUCCESS| G[sufficient fires — stop]      F --&gt;|PAM_AUTH_ERR| H[fall through to common-auth]      H --&gt; I[pam_unix.so — password prompt]      I --&gt; J{password ok?}      J --&gt;|yes| K[PAM_SUCCESS]      J --&gt;|no| M[PAM_AUTH_ERR — denied]    end    G --&gt; N([sudo proceeds])    K --&gt; N    M --&gt; O([access denied])The module has to implement two function. The first one is pam_sm_authenticate function. The pam_sm_authenticate function is the service module’s implementation of the pam_authenticate interface. The user is required to provide an authentication token depending upon the authentication service, usually this is a password, but could also be a finger print in this tutorial context face verification 6.#include &lt;security/pam_modules.h&gt;int pam_sm_authenticate(pam_handle_t *pamh, int flags, int argc,                        const char **argv);Return values:  PAM_AUTH_ERR: Authentication failure.  PAM_CRED_INSUFFICIENT: For some reason the application does not have sufficient            credentials to authenticate the user.  PAM_AUTHINFO_UNAVAIL: The modules were not able to access the authentication            information. This might be due to a network or hardware failure etc.  PAM_SUCCESS: The authentication token was successfully updated.  PAM_USER_UNKNOWN: The supplied username is not known to the authentication            service.  PAM_MAXTRIES: One or more of the authentication modules has reached its            limit of tries authenticating the user. Do not try again.The second is pam_sm_setcred. The function required by the PAM spec even if unused. The pam_sm_setcred function is the service module’s implementation of the pam_setcred interface. This function performs the task of altering the credentials of the user with respect to the corresponding authorization scheme 6.#include &lt;security/pam_modules.h&gt;int pam_sm_setcred(pam_handle_t *pamh, int flags, int argc,                   const char **argv);Return values:  PAM_CRED_UNAVAIL: This module cannot retrieve the user’s credentials.  PAM_CRED_EXPIRED: The user’s credentials have expired.  PAM_CRED_ERR: This module was unable to set the credentials of the user.  PAM_SUCCESS: The user credential was successfully set.  PAM_USER_UNKNOWN: The user is not known to this authentication module.These, non-PAM_SUCCESS, return values will typically lead to the credential stack failing. The first such error will dominate in the return value of pam_setcred().Now let’s have a look at a concrete example of these two functions:#define PAM_SM_AUTH#include &lt;security/pam_ext.h&gt;#include &lt;security/pam_modules.h&gt;PAM_EXTERN int pam_sm_authenticate(pam_handle_t *pamh, int /*flags*/,                                   int argc, const char **argv) {  try {    // 1. load enrolled faces from disk    // 2. capture frames from camera    // 3. detect, align, and verify face    // 4. check liveness    if (face_matches)      return PAM_SUCCESS;   // grant access    else      return PAM_AUTH_ERR;  // deny — PAM falls through to next module  } catch (const std::exception &amp;e) {    pam_syslog(pamh, LOG_ERR, \"face_verify: %s\", e.what());    return PAM_AUTH_ERR;  }}PAM_EXTERN int pam_sm_setcred(pam_handle_t *, int, int, const char **) {  return PAM_SUCCESS;  // required by PAM spec, nothing to do here}The module returns:  PAM_SUCCESS: in case face accepted  PAM_AUTH_ERR: all failure paths (no enrolled faces, camera failure, no frames, no face detected, liveness failure, score below threshold, exception)Notice the module never returns PAM_IGNORE. This means every failure path is a hard authentication failure, which is the right behaviour when combined with sufficient in the PAM config. PAM will fall through to common-auth only on PAM_AUTH_ERR, not silently.That covers the system side of the problem. The PAM layer gives us a clean hook — pam_sm_authenticate — where we can plug in authentication logic without touching the applications that use it. To summarise what we’ve done on this side:  Understood the three-layer PAM architecture: applications delegate to PAM core, PAM core delegates to modules.  Inspected a real /etc/pam.d/sudo configuration and understood what each directive does.  Placed our custom module in the stack with sufficient so that a successful face verification grants access immediately, and a failure falls through gracefully to the standard password prompt via common-auth.  Implemented the two entry points the PAM spec requires: pam_sm_authenticate for the actual authentication decision, and pam_sm_setcred as a no-op stub that satisfies the ABI contract.The PAM side is intentionally thin — it knows nothing about cameras, embeddings, or liveness. Its only job is to return PAM_SUCCESS or PAM_AUTH_ERR. Everything interesting happens behind those four lines of pseudocode we left as comments:// 1. load enrolled faces from disk// 2. capture frames from camera// 3. detect, align, and verify face// 4. check livenessIn the next part, we will fill those in. We will cover:  Face database — how enrolled faces are stored and loaded from disk at authentication time.  Dual capture — reading synchronized RGB and IR frames from the webcam.  Detection and alignment — using a YuNet-based ONNX model to locate and crop faces to a canonical 112×112 patch.  Recognition — extracting embeddings with a MobileNet-based deep model, and computing classical LBP histograms as a complementary signal.  Liveness — using the IR feed and inter-frame motion to reject photo spoofing attempts.  Ensemble — fusing the deep and classical scores into a single acceptance decision.  Before you proceed: if you are following along and have already modified /etc/pam.d/sudo, keep a root shell open in a separate terminal at all times while working through the next part. A bug in pam_sm_authenticate will cause PAM_AUTH_ERR on every call, which means sudo will fall back to the password prompt — but a crash or a missing .so file can behave less gracefully depending on your distribution. The safety net costs nothing and has saved this author more than once.References:            https://man7.org/linux/man-pages/man3/pam.3.html &#8617;              https://documentation.suse.com/de-de/sle-micro/5.3/html/SLE-Micro-all/cha-pam.html &#8617;              https://www.redhat.com/en/blog/pluggable-authentication-modules-pam &#8617;              https://docs.redhat.com/en/documentation/red_hat_enterprise_linux/6/html/managing_smart_cards/pam_configuration_files &#8617;              https://man7.org/linux/man-pages/man5/pam.conf.5.html &#8617; &#8617;2              https://github.com/linux-pam/linux-pam &#8617; &#8617;2      "

                        {
                          "title"    : "Immutable-Like Developer Workstation Setup",
                          "category" : "",
                          "tags"     : " Linux, Atomic, Developer Workstation, Immutable",
                          "url"      : "/2026/05/25/immutable-like-os.html",
                          "date"     : "May 25, 2026",
                          "excerpt"  : "From the beginning of my career, I have been interested in isolating development environments for reproducibility, portability, and rapid recovery. In the past, I was thinking, docker is the best tool for this purpose. So, I tried to use docker fo...",
                          "content"  : "From the beginning of my career, I have been interested in isolating development environments for reproducibility, portability, and rapid recovery. In the past, I was thinking, docker is the best tool for this purpose. So, I tried to use docker for my development environment. I created a github repository, and pushed my dockerfiles to it. I also added github actions to build and push images to docker hub. At the beginning, I just run an ssh server in my development docker containers and treat them like a remote server, then ssh into docker image, rsync my source code, and run/debug with an IDE. Later, I found out devcontainer is much better for this purpose and I replaced my worklfow to use devcontainers (actually i just removed the ssh server from my docker images).At some point, I watched a Youtube video about bootc and I was very inspired by it, started reading about it more and more. And, then later, I found myself reading ostree. All these learnings and readings lead me to using immutable OS. I tried Fedora Kinoite, and Universal Blue Aurora for a while. And I have to say, I really love the experience. But, there was some shortcomings that I couldn’t overcome yet. Before the release of Fedora 44, I planned to design my own atomic/immutable-like OS. I, first, wrote my goal, my architecture and then my requirements, applications that I used everyday, my habits/preferences/workflows, and etc. Then I tried to organize setup/instalation setups in a Makefile, and series of bash scripts. You can see my repo here. But, the rest of this post explains the core idea, architecture, goal, and some choices. You can adapt it to your needs as well.  Unlike NixOS, this setup does not attempt full declarative system management. The goal is operational stability with minimal workflow disruption, not total system reproducibility. But, the declarative apporoach of NixOs was very inspiring.  The Architectural Philosophy: Keep the foundation boring, stable, and highly secure. Elevate application runtimes, developer environments, and CLI suites to isolated, user-space layers. Drive everything through deterministic, version-controlled configuration.The GoalTo establish a highly optimized, high-performance developer workstation using Fedora KDE Plasma Desktop and an NVIDIA GPU that behaves as close to a modern atomic/immutable operating system as possible.This is achieved by implementing four core architectural pillars:graph TD    A[User Space / GUI] --&gt;|Flatpak / Sandbox| B(Host OS / Core System)    C[User Space / CLI] --&gt;|Homebrew / User Land| B    D[Development Runtimes] --&gt;|Distrobox / Podman| B    B --&gt;|Btrfs Snapshots| E[Snapper Transactional Rollback]  Zero Host Drift: Minimize ongoing host modification. After the initial boot and setup wave, dnf on the host is locked down. The host OS acts strictly as an unpolluted, bare-metal hardware abstraction layer (kernel, legacy drivers, container engines).  Layered Responsibility: Enforce a strict decoupling of roles. Universal CLI utilities live in Homebrew, desktop applications live in Flatpak, and mutable developer runtimes run isolated inside Distrobox.  Frictionless Legacy Hardware Integration: Secure maximum performance and reliability from legacy NVIDIA cards (580xx branch) without encountering the compilation issues and layout friction typical of ostree-based systems.  Deterministic Reproducibility: Ensure the complete desktop environment, tool suite, and configuration can be rebuilt programmatically in minutes from a single configuration using chezmoi dotfiles, Brewfile manifests, and container definitions.  This setup is not cryptographically immutable and does not enforce a read-only root filesystem.  Instead, it relies on:      minimized host package installation    transactional Btrfs snapshots    reproducible declarative setup    containerized development environments    restricted host package workflows    user-level operational discipline    Homebrew is not used because it is “better” than DNF.  It is used because:      it is fully user-space scoped    it keeps personal CLI tooling independent from the host OS lifecycle    the same Brewfile works across Linux and macOS    uninstalling the workstation does not affect the toolchain layer    it reduces host package drift significantly  The Mental ModelThis system is built as a snapshot-backed minimal host, offering a robust alternative to fully immutable operating systems (such as Fedora Silverblue or Kinoite). Instead of enforcing a read-only filesystem via hardware or kernel blocks, I establish a disciplined layer separation reinforced by tooling and user habit.System Architecturegraph TB    subgraph User_Space [User Space - Portable &amp; Disposed]        Flatpak[GUI Applications&lt;br&gt;&lt;i&gt;Flatpak / Flathub&lt;/i&gt;]        Brew[CLI Development Tools&lt;br&gt;&lt;i&gt;Homebrew / ~/.linuxbrew&lt;/i&gt;]        Distrobox[Development Sandboxes&lt;br&gt;&lt;i&gt;Distrobox / Podman&lt;/i&gt;]    end    subgraph Host_OS [Host OS - Boring &amp; Durable]        direction TB        KDE[KDE Plasma Desktop &amp; Wayland]        Drivers[NVIDIA 580xx Legacy Drivers &amp; Codecs]        Kernel[Linux Kernel, SELinux, Systemd, virtualization]        Btrfs[Btrfs Filesystem Layout / /var/mount]    end    subgraph Safety_Net [Rollback Layer - Transactional]        Snapper[Snapper / grub-btrfs&lt;br&gt;&lt;i&gt;Bootable transactional snapshots&lt;/i&gt;]    end    Flatpak --&gt; KDE    Brew --&gt; Host_OS    Distrobox --&gt;|GPU Passthrough / CDI| Drivers    Distrobox --&gt;|Mounts| Btrfs    Host_OS === Safety_NetLayer Lifecycle &amp; Management            Layer      Target Runtimes      State Style      Managed By      Path Context                  GUI Apps      Browsers, Communication, Productivity      Sandboxed / Stateful      flatpak      ~/.var/app/              CLI Tools      Editor (Neovim), Terminal Multiplexer, Shell Utils      User-owned / Stateful      brew      /home/linuxbrew/              Dev Environments      Compilers (GCC/Clang), Runtimes (Node/Python), SDKs      Ephemeral / Disposable      distrobox      Isolated containers / Shared $HOME              Base Host      Display, Network, Hardware virtualization, Security      Locked / Minimal      Automated / dnf-host      /, /usr, /etc      Why This Approach?Traditional Linux workstation setups inevitably suffer from Operating System Decay. Over months and years, conflicting global libraries, orphaned development packages, drifting systemd services, and mismatched interpreter versions (Python, Node) slowly degrade system stability and make disaster recovery nearly impossible.This setup resolves OS decay by enforcing a hybrid, layered model that offers the reliability of an immutable operating system with the uncompromised flexibility of standard Fedora Workstation.This creates a practical middle ground between a traditional mutable Linux installation and a fully immutable operating system:            Traditional distro      This setup      Fully immutable distro                  Everything installed on host      Host minimized intentionally      Host almost completely locked              Easy to modify, easy to break      Controlled modification model      Very resistant to accidental breakage              Package sprawl over time      Clear separation of responsibilities      Strong separation enforced by design              Rollback is manual      Snapper snapshots + rollback      Atomic image rollback              Very flexible      Flexible where it matters      More opinionated workflow      For a personal workstation, this balance is often more comfortable than a strict immutable workflow because it preserves flexibility without giving up reproducibility and rollback safety.Why not Silverblue or Kinoite?While genuine atomic systems are excellent, they present significant friction for active developer machines, particularly those relying on older hardware:  The Legacy NVIDIA Bottleneck: Atomic systems layer the NVIDIA driver on top of the base system image via rpm-ostree. While this works well for modern GPUs supported by the latest driver, Pascal and Turing cards requiring the legacy 580xx branch face high friction. Kernel upgrades often outpace legacy driver repository updates, causing silent build failures, broken boot states, or complex manual overrides. Staying on Workstation allows standard akmod to safely compile drivers locally at the time of update, completely controlled by local snapshots.  Granular Workstation Rollbacks: Immutability’s primary asset is atomic OS-level rollback. However, on a single personal workstation, Snapper on Btrfs provides per-transaction rollback. If a system update or configuration change breaks your desktop, you can boot into a pre-update snapshot from the GRUB menu or undo the exact DNF transaction with a single command. You gain 100% of the safety with none of the read-only filesystem restrictions.  Host Level Debugging &amp; Virtualization: Developers occasionally need to run low-level profilers (perf), system-call tracers (strace), system virtualization (QEMU/KVM), or kernel-header dependent debuggers. Layering these deep dependencies on rpm-ostree requires frequent host rebases and compromises the core value of the immutable image. A minimal, snapshot-protected host handles these tools natively with zero friction.Why Fedora KDE Workstation?  Current packages. Fedora ships recent kernel, systemd, and Mesa versions — important for GPU driver compatibility and modern container tooling (Podman, CDI, Netavark).  Btrfs by default. Anaconda creates Btrfs with root and home subvolumes out of the box, giving you Snapper-compatible layout with no manual partitioning work.  DNF5 + RPM Fusion. DNF5 (Fedora 41+) is significantly faster than DNF4. Combined with RPM Fusion’s broad package set, the host package story is solid for a one-time-setup model.  SELinux enforcing by default. Strong security posture without sacrificing usability.  KDE Plasma is highly configurable, resource-efficient, and works well with NVIDIA on both X11 and Wayland(my choice). Compared to GNOME, it requires no extensions to be fully functional.  Immutable-first tooling is well-tested here. Because Fedora is home to Silverblue/Kinoite, tools like Distrobox, Toolbox, and Flatpak are first-class citizens with excellent Fedora-specific documentation.Why this workflow works well on a personal machineThis setup deliberately separates responsibilities across layers instead of turning the host operating system into a general-purpose dumping ground.The idea is simple:  The host OS should stay boring and predictable.Fedora handles the kernel, graphics stack, firmware, filesystem, networking, virtualization, and security updates.  GUI applications should stay sandboxed and disposable.Flatpak keeps desktop applications isolated from the base system while still integrating nicely with KDE Plasma.  CLI tooling should stay user-owned.Homebrew avoids cluttering the host with development utilities and keeps your personal shell environment portable across Linux and macOS.  Development stacks should stay containerized.Distrobox gives you mutable environments for compilers, SDKs, language runtimes, and experimental packages without polluting the base OS.Advantages of this hybrid approach            Advantage      Detail                  NVIDIA legacy support      Pin exact driver versions; avoid akmod regressions on older GPUs              Full host flexibility      Any COPR, any RPM — the host is writable, but access is guarded              Real rollback      Snapper pre/post snapshots on every dnf transaction, bootable from GRUB              Clean separation      Host = kernel/drivers; Homebrew = CLI tools; Flatpak = GUI apps; Distrobox = dev environments              Reproducible rebuild      Brewfile + distrobox.ini + Makefile phases + host-setup.sh rebuild the full setup              Low ongoing maintenance      make update handles Flatpak + Brew + Distrobox; host gets security patches automatically      Trade-offs            Trade-off      Detail                  Not truly immutable      The root filesystem is writable; the dnf guard enforces discipline, not hardware              Two package managers      Homebrew and DNF can have conflicting library versions — keep dev work inside Distrobox              Homebrew glibc footprint      Homebrew on Linux ships its own glibc (~200 MB); expected, but worth knowing              Phase 7 requires upfront work      chezmoi + dotfiles are powerful but take time to set up correctly      Setup waves:            Wave      Phase      What                  A — Host (once)      1–2      NVIDIA, Snapper, SSH, Podman/CDI, codecs, virt, crypto              B — User CLI      3      Development Tools → Homebrew → zsh → Brewfile (incl. Distrobox)              C — Apps &amp; dev      4–5      Flatpak GUIs, Distrobox containers, exports              D — Lockdown      6–7      dnf guard, automatic security updates, dotfiles      Until Phase 6, use plain sudo dnf for host installs. After Phase 6, use sudo dnf-host (the guard blocks bare dnf).Makefile automation (~/setup/Makefile)Most setup and day-2 steps are available as make targets in ~/setup/. Raw commands below are kept for reference; where automation exists, a Make line is shown.  Day-2 automation: make update (Flatpak + Brew + Distrobox) can be added to a cron job or a systemd user timer for fully hands-off updates. Host security patches are already automated via dnf5-automatic (Phase 6). Brew and Flatpak don’t auto-update by design — make update is the deliberate trigger.make help-setup   # one-time setup targets (phases 0–7)make help         # day-2 maintenance (update, health, snapper, …)make &lt;target&gt;     # from any directory# Optional shell alias (~/.zshrc):# alias ws='make -C ~/setup'            Phase      Aggregate target      Verify (after phase)                  0      —      make phase0-verify              1      make phase1-all      phase1-verify (auto); after reboot: phase1-verify-gpu              2      make phase2-all      phase2-verify (auto)              3      make phase3-brew-deps …      phase3-verify (mostly WARN — brew/shell are manual)              4      make phase4-flatpak-apps …      phase4-verify              5      make phase5-distrobox-dev …      phase5-verify              6      make phase6-dnf-automatic …      phase6-verify              All      —      make verify-all              Day-2      make update health      No host dnf      Notes: phase1-all and phase2-all run their verify step automatically. Failures exit non-zero; WARN lines are advisory (optional packages, post-reboot checks, manual steps). Phase 1 host wave still needs phase1-upgrade + reboot before phase1-verify-gpu. Run make … phaseN-verify without sudo (root breaks Homebrew and ~/.local checks; if you used sudo make, verify re-runs as your user automatically).Layout: ~/setup/Makefile, ~/setup/scripts/*.sh, this guide at ~/setup/fedora-kde-immutable-like-setup.md. Skipped steps (ISO install, ssh-copy-id, interactive installers) have no target — see make help-setup.Phase 0: Installation  Make: make phase0-verify (after install)  Download Fedora KDE Spin 44 ISO  Boot installer and choose Custom Partitioning  Use Btrfs as the filesystem (this is the default on Fedora, but verify)  Suggested partition layout:          /boot/efi — 512 MB, FAT32      /boot — 1 GB, ext4      / — Btrfs (rest of disk)        Fedora creates subvolumes automatically: root, home, var  After install, verify Btrfs layout (optional):    findmnt -no FSTYPE,SUBVOLNAME /sudo btrfs subvolume list /            Plan /var/mount layout: all extra disks mount at /var/mount/&lt;Name&gt; (e.g. Projects, Backup, Workspace) — not /mnt or $HOME. See Appendix C.          Removable media note: KDE Plasma auto-mounts removable USB drives under /run/media/$USER/&lt;label&gt; via Solid — this is not configurable without patching udev rules, and isn’t worth fighting. The /var/mount convention is for permanent extra disks listed in /etc/fstab. Leave USB auto-mount behaviour as-is.        Complete installation and rebootPhase 1: NVIDIA 580xx Legacy Driver (Host — the only big dnf step)  Make: make phase1-all — or step-by-step: phase1-dnf-tweaks, phase1-ssh, … (help-setup). After install: phase1-verify; after reboot: phase1-verify-gpu (or make gpu-test).This is the one area where you must touch the host system with dnf. Get it done first.DNF Speed Tweaks (Do This First)  Make: make phase1-dnf-tweaksFedora’s defaults are conservative. Two small config changes make every subsequent dnf command significantly faster — apply these before the first dnf upgrade so the rest of the setup benefits.  Enable parallel downloads and fastest-mirror selection:    sudo dnf config-manager setopt max_parallel_downloads=10sudo dnf config-manager setopt fastestmirror=True        Alternatively, edit /etc/dnf/dnf.conf directly and add:    [main]max_parallel_downloads=10fastestmirror=Truedefaultyes=True       # Y is default for promptskeepcache=True        # Don't delete downloaded packages immediately# Fedora 44: if HTTPS to repos fails, set CA bundle explicitly (see Appendix A)sslcacert=/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem        Verify the settings took effect:    dnf --dump-main-config | grep -E '^(fastestmirror|max_parallel_downloads) = '      A few caveats from the field:  max_parallel_downloads=10 is the sweet spot on most connections. Higher (15–20) helps on very fast networks; lower (3–5) on flaky ones.  fastestmirror=True adds a few seconds to the first run as it probes mirrors, then makes subsequent runs noticeably faster. If your network is unstable and probing takes longer than it saves, unset with sudo dnf config-manager unsetopt fastestmirror.      defaultyes=True is convenient but means dnf install foo won’t prompt — pair this with the dnf guard trick from Phase 6 so you don’t auto-confirm a typo on the host.    Update the system:    sudo dnf upgrade --refresh -ysudo reboot              Make: make phase1-upgrade (reboot manually)      SSH Server (Early Setup)  Make: make phase1-ssh · optional: make phase1-fail2banGet SSH running first so you can manage the machine remotely while doing the rest of the setup — useful for remote access from a laptop, VS Code Remote-SSH, or as a jump host to other machines on your network.  Verify openssh-server is installed (usually shipped with Fedora):    rpm -q openssh-server || sudo dnf install -y openssh-server        Enable and start the sshd service:    sudo systemctl enable --now sshd        Open SSH port in firewalld:    sudo firewall-cmd --permanent --add-service=sshsudo firewall-cmd --reload        Generate an SSH key for this machine if you don’t have one:    ssh-keygen -t ed25519 -C \"$(whoami)@$(hostname)\"        Add your public key from another machine (so you can log in without a password):    # From your other machine:ssh-copy-id your-user@this-host  # Or manually: append your laptop's ~/.ssh/id_ed25519.pub to# ~/.ssh/authorized_keys on this host, then:chmod 700 ~/.sshchmod 600 ~/.ssh/authorized_keys        Harden the SSH config. Use a drop-in file in /etc/ssh/sshd_config.d/ to keep the main config clean and survive future package updates:    sudo tee /etc/ssh/sshd_config.d/00-hardening.conf &gt; /dev/null &lt;&lt; 'EOF'# No root loginPermitRootLogin no  # Key-based auth only — VERIFY KEY-BASED LOGIN WORKS BEFORE APPLYING THISPasswordAuthentication noKbdInteractiveAuthentication noPubkeyAuthentication yes  # Sensible session limitsMaxAuthTries 3ClientAliveInterval 300ClientAliveCountMax 2  # (Optional) restrict to specific users# AllowUsers your-usernameEOF  # Syntax check BEFORE restart — catches typos that would otherwise lock you outsudo sshd -t &amp;&amp; sudo systemctl restart sshd        The sshd -t validates the full merged config (main file + all drop-ins) and exits non-zero on any error. If it fails, fix the file and re-run — your existing SSH session stays alive while you fix it.    ⚠️ Before disabling password auth, open a second SSH session and verify your key works. If something’s misconfigured, your existing session stays alive while you fix it — saving you from getting locked out.    (Optional) Install fail2ban to block brute-force attempts. On Fedora, fail2ban ships with zero active jails — installing the package alone does nothing. You have to enable the sshd jail explicitly:    sudo dnf install -y fail2ban fail2ban-firewalld            Create a drop-in jail config for sshd:          chezmoi note: This file lives in /etc/fail2ban/ — chezmoi only manages $HOME. The make phase1-fail2ban target re-creates it idempotently; that’s the right place to track it.      sudo tee /etc/fail2ban/jail.d/sshd.local &gt; /dev/null &lt;&lt; 'EOF'[sshd]enabled = truebackend = systemdport    = sshmaxretry = 5findtime = 10mbantime = 1hEOF              Why these settings:          enabled = true — without this line, the jail exists but doesn’t run. This is the part most guides miss.      backend = systemd — Fedora logs SSH attempts to the journal, not /var/log/secure. Without this, fail2ban silently fails to find anything to scan.      port = ssh — uses the symbolic name; if you changed to port 2222, change this to port = 2222.      maxretry = 5 over findtime = 10m, ban for bantime = 1h — sensible defaults; tune to taste.        Start fail2ban and verify the jail is active:    sudo systemctl enable --now fail2bansudo fail2ban-client status                  # Should list 'sshd' under Jail listsudo fail2ban-client status sshd             # Detailed status (currently failed, banned, etc.)        If fail2ban-client status shows no jails, check journalctl -u fail2ban for errors — common causes are backend = auto defaulting to a non-existent log file, or the [sshd] jail conflicting with a separately-named definition.    (Optional) Set the default action globally to use firewalld instead of iptables (the fail2ban-firewalld package installs /etc/fail2ban/jail.d/00-firewalld.conf which already does this — verify with):    cat /etc/fail2ban/jail.d/00-firewalld.conf# Should show: banaction = firewallcmd-rich-rules[actiontype=&lt;multiport&gt;]        (Optional) Change SSH port from 22 to reduce log noise from scanners:    # Edit /etc/ssh/sshd_config.d/00-hardening.conf, add:# Port 2222  # Update firewalld:sudo firewall-cmd --permanent --add-port=2222/tcpsudo firewall-cmd --permanent --remove-service=sshsudo firewall-cmd --reload  # Update SELinux to allow the new port:sudo semanage port -a -t ssh_port_t -p tcp 2222  sudo sshd -t &amp;&amp; sudo systemctl restart sshd        Note: if you change the port, remember to update your ~/.ssh/config on client machines, and update fail2ban config accordingly.    Test from another machine:    ssh your-user@this-host         # or with -p 2222 if you changed the port        (Optional) Add a client-side ~/.ssh/config entry on your laptop:    Host workstation    HostName &lt;your-fedora-machine-ip-or-hostname&gt;    User your-username    Port 22    IdentityFile ~/.ssh/id_ed25519    ForwardAgent yes      # useful for git push from the workstation using your client computer keys      Debugging Tools (Host)  Make: make phase1-debug · make phase1-perfSystem debuggers and profilers need kernel-level access (perf counters, ptrace, kprobes), so they go on the host — not in a sandbox. These complement your existing GDB infrastructure.  Install the core debugging stack:    sudo dnf install -y \  gdb \  gdbserver \  strace \  ltrace \  perf \  valgrind \  binutils \  elfutils      What each tool does:  gdb — interactive debugger; pair with a ~/.gdbinit for pretty-printers and project-specific helpers  gdbserver — runs on the host to accept remote debugger connections (e.g., from VS Code on a laptop), or attach from a local gdb client to a gdbserver on a remote machine  strace / ltrace — system-call and library-call tracing; essential for diagnosing hangs, unexpected file access, or missing shared libraries  perf — Linux perf events: CPU profiling, cache miss analysis, scheduler latency. Needs host-level access, which is why it can’t live in a container      valgrind — memory error detector; catches uninitialized reads, use-after-free, and heap leaks        (Optional) Cross-architecture debugging (e.g., aarch64) — install gdb-multiarch via a Distrobox with a Debian/Ubuntu base image, which packages it directly. Fedora doesn’t ship gdb-multiarch; building it from source on the host is not worth the effort when a one-line distrobox create gives you a clean cross-capable gdb.    Allow perf to access hardware counters without root (set kernel param at boot):    echo \"kernel.perf_event_paranoid = 1\" | sudo tee /etc/sysctl.d/99-perf.confsudo sysctl --system        Make: make phase1-rpmfusion · make phase1-nvidia · make phase1-nvidia-suspend · make phase1-nvidia-toolkit · make phase1-podman · make phase1-cdi · make phase1-refresh-cdi-script  Enable RPM Fusion repos:    sudo dnf install -y \  https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm \  https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm        Check which driver branch is available for your GPU:    dnf search akmod-nvidia | grep '^akmod-nvidia'# Current packages: akmod-nvidia (latest), akmod-nvidia-580xx (legacy Pascal/Turing)# Use the latest branch (akmod-nvidia) for GTX 16xx / RTX 20xx and newer.# Use akmod-nvidia-580xx for GTX 10xx (Pascal) and GTX 9xx (Maxwell).        Install the 580xx legacy driver (for Pascal GPUs — GTX 10xx series):    sudo dnf install -y \  akmod-nvidia-580xx \  xorg-x11-drv-nvidia-580xx \  xorg-x11-drv-nvidia-580xx-cuda \  xorg-x11-drv-nvidia-580xx-cuda-libs \  xorg-x11-drv-nvidia-580xx-libs        Blacklist Nouveau:    echo \"blacklist nouveau\" | sudo tee /etc/modprobe.d/blacklist-nouveau.confsudo dracut --force        dracut --force rebuilds the initramfs (initial RAM disk) — the small filesystem the kernel boots from before the real root is mounted. The Nouveau blacklist and the new NVIDIA kernel module are baked into the initramfs here. Without this step, the kernel would ignore the blacklist on next boot and Nouveau would load before the NVIDIA driver, causing a conflict.    Reboot and verify:    sudo reboot# After reboot:nvidia-smi          # Should show your GPU, and selected driver version        Fix NVIDIA suspend/resume (Pascal has known issues — system hangs or wakes to a black screen). NVIDIA ships systemd services that handle GPU state save/restore, but they’re not enabled by default:    sudo systemctl enable \  nvidia-suspend.service \  nvidia-hibernate.service \  nvidia-resume.service        Add the persistence kernel parameter so the driver preserves GPU VRAM across suspend:    sudo tee /etc/modprobe.d/nvidia-power-management.conf &gt; /dev/null &lt;&lt; 'EOF'options nvidia NVreg_PreserveVideoMemoryAllocations=1options nvidia NVreg_TemporaryFilePath=/var/tmpEOF  sudo dracut --force        After reboot, test with systemctl suspend and verify the display comes back. If it still fails:          Try kernel param nvidia-drm.modeset=1 (some setups need it, others break with it)      Check journalctl -b -1 | grep -i nvidia after a failed resume      As a last resort, switch to s2idle by setting mem_sleep_default=s2idle (slower wake but more reliable on Pascal)            Install nvidia-container-toolkit for GPU passthrough to containers. On Fedora the .repo file ships with the GPG key URL embedded (gpgkey=...), so DNF fetches and imports it automatically — no manual gpg --dearmor step needed (that pattern is Debian-only).    Fedora 44 note: If curl or dnf fails on HTTPS, ensure sslcacert is set in /etc/dnf/dnf.conf (see DNF tweaks above and Appendix A).    # Add NVIDIA container repocurl -fsSL https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo | \  sudo tee /etc/yum.repos.d/nvidia-container-toolkit.repo# Pin version for reproducibility (check https://github.com/NVIDIA/nvidia-container-toolkit/releases for updates)export NVIDIA_CONTAINER_TOOLKIT_VERSION=1.19.0-1sudo dnf install -y \  nvidia-container-toolkit-${NVIDIA_CONTAINER_TOOLKIT_VERSION} \  nvidia-container-toolkit-base-${NVIDIA_CONTAINER_TOOLKIT_VERSION} \  libnvidia-container-tools-${NVIDIA_CONTAINER_TOOLKIT_VERSION} \  libnvidia-container1-${NVIDIA_CONTAINER_TOOLKIT_VERSION}        On first install, DNF prompts to import the NVIDIA GPG key — answer yes. Verify the key was imported:    rpm -q gpg-pubkey --qf '%{summary}\n' | grep -i nvidia        Podman — usually preinstalled on Fedora KDE; install if missing:    rpm -q podman || sudo dnf install -y podman podman-composepodman --version        Distrobox — launcher for Phase 5 dev containers. Prefer Homebrew (Phase 3: brew install distrobox or make phase3-brew-cli); make phase1-podman falls back to dnf only if Brew is not installed yet (I prefer isuing brew):    command -v distrobox &gt;/dev/null || rpm -q distrobox || brew install distrobox || sudo dnf install -y distroboxdistrobox --version        Verification accepts any of: distrobox on PATH, rpm -q distrobox, or brew list distrobox.    Generate the CDI specification for NVIDIA GPUs. CDI (Container Device Interface) is the modern, runtime-agnostic way to expose devices to containers — replaces the old Docker-specific --gpus flag:    sudo mkdir -p /etc/cdisudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml        Verify the CDI devices are discoverable:    nvidia-ctk cdi list# Should show: nvidia.com/gpu=0, nvidia.com/gpu=all, etc.        Test GPU access in Podman (rootful, simpler first test):    podman run --rm --device nvidia.com/gpu=all \  nvcr.io/nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi        Test GPU access in rootless Podman (preferred for dai   The script may install grub-btrfs for you; if you set up Snapper manually, use the COPR steps below.    Create Snapper config for root:    sudo snapper -c root create-config /        Allow your user to run Snapper without sudo (do this once right after create-config):    sudo snapper -c root set-config ALLOW_USERS=\"$USER\"sudo snapper -c root set-config SYNC_ACL=yessnapper list    # verify — should work without sudo              Make: included in make phase2-snapper        Enable automatic pre/post snapshots for DNF transactions          The python3-dnf-plugin-snapper or the SysGuides script handles this      Every dnf install/remove/upgrade will now create a before+after snapshot pair      Snapper: with vs without sudoAfter ALLOW_USERS + SYNC_ACL (above), daily use omits sudo and the -c root shortcut (snapper defaults to the root config when it is the only config):            Command      sudo?                  snapper list      No              snapper list -t single      No              snapper create --description \"…\"      No (with ALLOW_USERS)              snapper delete &lt;n&gt;      No (with ALLOW_USERS)              snapper undochange &lt;pre&gt;..&lt;post&gt;      No (with ALLOW_USERS)              snapper set-config …      Yes              snapper create-config /      Yes              snapper cleanup timeline / cleanup number      Yes (or automatic via snapper-cleanup.timer)              grep … /boot/grub2/grub.cfg      Yes (root-only file)      You can still prefix sudo snapper -c root … everywhere; it works, but is unnecessary for the No rows after ALLOW_USERS is set.      Install grub-btrfs so snapshots appear in the GRUB boot menu.    grub-btrfs is not in Fedora 44 official repos. The kylegospo/grub-btrfs COPR is incomplete on Fedora 44: it ships grub-btrfs.path (broken: needs .snapshots.mount) but not grub-btrfsd.service. Prefer install from source (below) or the full SysGuides script.    Recommended: install from upstream (includes grub-btrfsd)          Make: make phase2-grub-btrfs        sudo dnf install -y git make inotify-tools# Optional: remove incomplete COPR package if you installed itsudo dnf remove -y grub-btrfs 2&gt;/dev/null || truetmpdir=$(mktemp -d)trap 'rm -rf \"$tmpdir\"' EXITgit clone --depth 1 https://github.com/Antynea/grub-btrfs \"$tmpdir/grub-btrfs\"cd \"$tmpdir/grub-btrfs\"# Fedora-specific config (same as SysGuides)sed -i \  -e 's|^#GRUB_BTRFS_SNAPSHOT_KERNEL_PARAMETERS=.*|GRUB_BTRFS_SNAPSHOT_KERNEL_PARAMETERS=\"rd.live.overlay.overlayfs=1\"|' \  -e 's|^#GRUB_BTRFS_GRUB_DIRNAME=.*|GRUB_BTRFS_GRUB_DIRNAME=\"/boot/grub2\"|' \  -e 's|^#GRUB_BTRFS_MKCONFIG=.*|GRUB_BTRFS_MKCONFIG=/usr/bin/grub2-mkconfig|' \  -e 's|^#GRUB_BTRFS_SCRIPT_CHECK=.*|GRUB_BTRFS_SCRIPT_CHECK=grub2-script-check|' \  configsudo make installsudo systemctl enable --now grub-btrfsd.servicesystemctl status grub-btrfsd.service        If you keep the COPR package: fix grub-btrfs.path (no grub-btrfsd in RPM)    COPR enables grub-btrfs.path, which fails on Fedora:    Failed to start grub-btrfs.path: Unit \x2esnapshots.mount not found.        Fedora Snapper uses /.snapshots as a directory on the root subvolume — not a separate .snapshots.mount (Arch layout).    sudo systemctl disable --now grub-btrfs.path 2&gt;/dev/null || truesudo mkdir -p /etc/systemd/system/grub-btrfs.path.dsudo tee /etc/systemd/system/grub-btrfs.path.d/fedora.conf &gt; /dev/null &lt;&lt; 'EOF'[Unit]Requires=After=local-fs.targetEOFsudo systemctl daemon-reloadsudo systemctl enable --now grub-btrfs.pathsystemctl status grub-btrfs.path        If the path unit still fails, switch to install from upstream above — do not stay on COPR alone.    Generate GRUB config and test          Make: make phase2-grub-test · day-2: make health        ls /.snapshotssnapper create --description \"grub-btrfs test\"sudo grub-btrfssudo grub2-mkconfig -o /boot/grub2/grub.cfgsudo grep -i snapshot /boot/grub2/grub.cfg | head        On UEFI, if the boot menu does not change:    sudo grub2-mkconfig -o /boot/efi/EFI/fedora/grub.cfg        Health check (what “working” looks like):    systemctl is-active grub-btrfsd.service       # no sudo — should print: activesnapper list                                  # no sudo — requires ALLOW_USERS (Phase 2)snapper list -t single                        # no sudo — same, filtered viewsudo grep -i snapshot /boot/grub2/grub.cfg | head   # sudo — grub.cfg is root-only        Expected GRUB snippet:    ### BEGIN /etc/grub.d/41_snapshots-btrfs ###submenu 'Fedora Linux snapshots' {        Verify what is installed:    command -v grub-btrfs grub-btrfsdsystemctl list-unit-files 'grub-btrfs*'        References: Antynea/grub-btrfs, SysGuides snapper-fedora.    Without grub-btrfs: you can still roll back with snapper undochange from a running system — you just will not see snapshots in the GRUB menu at boot.    Set snapshot retention limits (avoid disk bloat; you already have hourly timeline snapshots — these limits prevent unbounded growth):          Make: make phase2-snapper-retention      sudo snapper -c root set-config \"NUMBER_LIMIT=50\"sudo snapper -c root set-config \"TIMELINE_LIMIT_HOURLY=5\"sudo snapper -c root set-config \"TIMELINE_LIMIT_DAILY=7\"sudo snapper -c root set-config \"TIMELINE_LIMIT_WEEKLY=4\"sudo snapper -c root set-config \"TIMELINE_LIMIT_MONTHLY=3\"                  Enable Snapper systemd timers (automatic timeline + cleanup — ships with the snapper package):    Fedora provides two timers; you want both enabled after setting limits above:                            Timer          Service          What it does                                      snapper-timeline.timer          snapper-timeline.service          Creates hourly timeline snapshots (you already have these)                          snapper-cleanup.timer          snapper-cleanup.service          Runs cleanup timeline + cleanup number per config                      sudo systemctl enable --now snapper-timeline.timersudo systemctl enable -- tainer launcher (Phase 5)        Add the Universal Blue tap for Linux-specific casks (IDEs, GUI apps that don’t sandbox well as Flatpaks):    brew tap ublue-os/tap        This is purely additive — homebrew/core continues to work exactly as before. The ublue tap deliberately uses a -linux suffix on every cask (visual-studio-code-linux, not visual-studio-code) so in practice you’ll never hit a name collision with core.    Install VS Code via the ublue tap (this resolves the Flatpak sandbox limitations from Phase 4 — full Docker, terminal, and Distrobox integration):    brew install --cask visual-studio-code-linux        Sync extensions and settings via VS Code Settings Sync (Microsoft/GitHub account login). This is the cleanest way to bring your full extension set from your previous machine:          Open VS Code → Accounts icon (bottom-left) → Turn on Settings Sync      Sign in with GitHub or Microsoft account      Choose what to sync: Settings, Keybindings, Extensions ← the important one, UI State, Snippets, Tasks, User Profiles      Extensions install in the background; takes a few minutes for a large set      Alternative (manual): export extension list via code --list-extensions &gt; vscode-extensions.txt, restore with xargs -L1 code --install-extension &lt; vscode-extensions.txt. Worth saving the list in your dotfiles repo regardless, as a fallback.        (Optional) Other useful casks from the ublue tap          Make: make phase3-brew-casks-optional:        brew install --cask jetbrains-toolbox-linux    # CLion, IntelliJ, PyCharm, etc.brew install --cask 1password-gui-linux        # Password managerbrew install --cask lm-studio-linux            # Local LLM runnerbrew install --cask vscodium-linux             # Telemetry-free VS Code build      How Brew Resolves Names Across TapsKnowing this saves confusion later:  homebrew/core is always searched first. It’s not a tap you can remove — it’s built into Brew itself. You cannot “switch to ublue tap only.”  Plain names use core by default. brew install neovim always pulls from homebrew/core, regardless of what taps you’ve added.  Same-name formulas cannot coexist. They install to the same Cellar path. If both core and a tap have foo, you must uninstall one to install the other.  To force a specific tap, fully qualify:    brew install ublue-os/tap/&lt;formula-name&gt;      # Force ublue tap versionbrew install homebrew/core/&lt;formula-name&gt;     # Force core version        In practice with the ublue tap: Zero conflicts. The -linux suffix on casks avoids all collisions. You can install everything with plain brew install &lt;name&gt; and Brew picks the right source automatically.            Command      Source                  brew install neovim      homebrew/core              brew install --cask visual-studio-code-linux      ublue-os/tap              brew install --cask jetbrains-toolbox-linux      ublue-os/tap              brew install ripgrep      homebrew/core      Phase 4: GUI Applications via Flatpak  Make: make phase4-flathub · make phase4-flatpak-apps · make phase4-plasma-widgets · make phase4-virt · make phase4-crypto · make phase4-okular · make phase4-flatpak-xdg (KDE menu fix)All GUI apps should come from Flathub. No dnf for desktop applications. (Host exceptions below use sudo dnf until Phase 6; after Phase 6 use sudo dnf-host.)  Enable Flathub (may already be enabled on Fedora 44):    flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepoflatpak remote-list      Troubleshooting: Flatpak apps missing from KDE menu / KRunnerOn most Fedora KDE installs, Flathub apps appear automatically. If they do not show in the application launcher or KRunner, prepend Flatpak export paths to XDG_DATA_DIRS system-wide (survives reboots; no per-app copying):sudo tee /etc/environment.d/flatpak.conf &gt; /dev/null &lt;&lt; EOFXDG_DATA_DIRS=/var/lib/flatpak/exports/share:$HOME/.local/share/flatpak/exports/share:/usr/local/share:/usr/shareEOF  chezmoi all.sh./install.shsystemctl restart --user plasma-plasmashellVirtualization (Host Exception)QEMU/KVM needs host-level integration (kernel modules, libvirt daemon, network bridges, /dev/kvm access) so it can’t run from a Flatpak. Install on the host with sudo dnf (or sudo dnf-host after Phase 6).Why you want it:  Test Ubuntu/Debian/Arch VMs without dual-booting  Validate Docker Swarm or Kubernetes setups against fresh OS images  Reproduce clean Linux environments for testing and troubleshooting      (Advanced) GPU passthrough to a Windows VM — possible on Pascal with caveats    Install virtualization packages on the host:    sudo dnf install -y \  qemu-kvm \  qemu-img \  libvirt \  libvirt-daemon-config-network \  virt-manager \  edk2-ovmf \  swtpm        Enable libvirt and add your user to the libvirt group:    sudo systemctl enable --now libvirtdsudo usermod -aG libvirt \"$USER\"# Log out and back in for group membership to applygroups        Verify KVM is available:    ls -l /dev/kvmvirt-host-validate qemu 2&gt;/dev/null || echo \"Install libvirt-client if validate is missing\"        Launch virt-manager from the app menu or:    virt-manager      Crypto &amp; PDF Signing (Host Exception)GPG, smartcards, and PDF signing don’t work well in Flatpak sandboxes:  gpg-agent runs at the host level — Flatpak GPG apps need access to host sockets  Smartcards (YubiKey, eID) require pcscd daemon access blocked by sandboxes  NSS certificate databases live in ~/.pki with paths Flatpak struggles with  KWallet integration goes through D-Bus on the hostThese are small KDE system tools (~50 MB total) that integrate deeply with the host. Install on the host with sudo dnf (legitimate exception to “no GUI on host”).  Install GPG + KDE crypto GUI + KWallet integration:    sudo dnf install -y \  gnupg2 \  kgpg \  kleopatra \  pinentry-qt \  kwalletmanager5 \  qgpgme        Configure GPG to use the Qt/KDE pinentry dialog (matches your desktop theme, integrates with KWallet):    mkdir -p ~/.gnupgchmod 700 ~/.gnupgecho \"pinentry-program /usr/bin/pinentry-qt\" &gt;&gt; ~/.gnupg/gpg-agent.confgpgconf --kill gpg-agent        Generate a GPG key (skip if you already have one):    gpg --full-generate-key# Choose: RSA and RSA (default), 4096 bits, key doesn't expire (or 2 years)            Launch KGpg from the application menu. It auto-detects your keys and integrates with KWallet for passphrase caching. KWallet itself is already running on KDE (kwalletmanager5 gives you the GUI to inspect/manage stored secrets).    (Optional) If you also want Kleopatra as an alternative GPG GUI — it’s more feature-rich (S/MIME, certificate management, file signing): already installed above. Both KGpg and Kleopatra can coexist; they use the same underlying GnuPG keyring.PDF Signing with OkularOkular (KDE’s PDF viewer) has built-in PDF digital signature support — both for adding and validating signatures.  Install Okular and PDF signing dependencies on the host:    sudo dnf install -y \  okular \  nss-tools \  poppler-utils        Set up your NSS certificate database (one-time):    mkdir -p ~/.pki/nssdbcertutil -d sql:$HOME/.pki/nssdb -N --empty-password        Import a certificate from a PKCS#12 file:    pk12util -d sql:$HOME/.pki/nssdb -i your-cert.p12# Or list certificates:certutil -d sql:$HOME/.pki/nssdb -L        (Optional) Smartcard / eID support — install PCSC daemon and OpenSC:    sudo dnf install -y pcsc-lite pcsc-tools openscsudo systemctl enable --now pcscd# Verify the daemon and reader:pcsc_scan        Sign a PDF in Okular:          Open the PDF      Tools → Digitally Sign…      Draw a rectangle where the signature appears      Select your certificate from the NSS database      Save the signed PDF (Okular forces “Save As” to preserve the original)        Verify a signed PDF from the CLI (useful for scripts/CI):    pdfsig signed-document.pdf# Shows signature validity, signer, timestamp      Why these aren’t via BrewHomebrew has GPG (brew install gnupg), but it ships an isolated GPG keyring under /home/linuxbrew and a separate gpg-agent. You’d end up with two keyrings (host’s and Brew’s) and your KDE apps would see different keys than your terminal. Sticking with the host GnuPG keeps everything pointing at one keyring at ~/.gnupg.Phase 5: Development Environments via Distrobox  Make: make phase5-distrobox-config · make phase5-distrobox-dev — no target: dnf install inside containers (run after distrobox enter)This is where your isolated development environments live — completely separated from the host OS. Distrobox should already be on your PATH from Phase 3 (brew install distrobox) or Phase 1 (dnf / make phase1-podman).  Verify Distrobox and Podman:    distrobox --versionpodman --version        Global Distrobox config — bind the whole /var/mount tree (requires disks mounted at /var/mount/* per Appendix C):    mkdir -p ~/.config/distroboxtee ~/.config/distrobox/distrobox.conf &gt; /dev/null &lt;&lt; 'EOF'# Host path must match fstab: Projects, Backup, Workspace live under /var/mount/container_additional_volumes=\"/var/mount:/var/mount:rslave\"# init_hooks = \"\"# additional_packages = \"\"EOF              chezmoi: Yes — ~/.config/distrobox/distrobox.conf lives in $HOME and should be tracked in your dotfiles repo. Add it with chezmoi add ~/.config/distrobox/distrobox.conf.        (Optional) Export a host IDE into the desktop menu from inside a container (example — adjust app name/path):    # After creating a container (below), from inside it or with --name:distrobox enter devdistrobox-export --app cursor --extra-flags=\"--new-window\"# Or export a binary to ~/.local/bin:distrobox-export --bin /usr/bin/cmake --export-path ~/.local/bin        distrobox-export --app creates a .desktop file in ~/.local/share/applications/ and a thin wrapper script in ~/.local/bin/. The app then appears in KDE’s application launcher and KRunner exactly like a natively installed app — the user has no visible indication it’s running inside a container.    Create a primary dev container (Fedora-based):    distrobox create --name dev --image registry.fedoraproject.org/fedora-toolbox:44distrobox enter dev  # Inside the container — install freely with dnf:sudo dnf install -y \  gcc gcc-c++ cmake make \  python3 python3-pip python3-devel \  nodejs npm \  gdb valgrind strace \  git-lfs \  openssl-devel        Export frequently-used binaries from containers to host:    # Inside the dev container:distrobox-export --bin /usr/bin/cmake --export-path ~/.local/bindistrobox-export --bin /usr/bin/gdb --export-path ~/.local/bin        (Optional) Create a distrobox.ini manifest for reproducible environments:    [dev]image=registry.fedoraproject.org/fedora-toolbox:44init=falseexported_bins=\"/usr/bin/cmake /usr/bin/gdb\"exported_bins_path=\"~/.local/bin\"additional_packages=\"gcc gcc-c++ cmake python3 python3-pip gdb\"[c_cpp]image=ubuntu:22.04init=falseadditional_packages=\"build-essential cmake python3 python3-pip\"        Recreate all containers from manifest:    distrobox assemble create --file ~/distrobox.ini      Phase 6: Lock Down the Host  Make: make phase6-dnf-automatic · make phase6-nvidia-versionlock · make phase6-dnf-guardNow that everything is set up, minimize future dnf usage on the host.  Audit what’s on the host — you should have only:          Fedora KDE base system      DNF speed tweaks (fastestmirror=True, max_parallel_downloads=10 in /etc/dnf/dnf.conf)      dnf5-plugin-automatic enabled with security-only updates, reboot=never      OpenSSH server (with hardened config, key-based auth, optional fail2ban)      Debugging tools (gdb, gdbserver, strace, ltrace, perf, valgrind)      NVIDIA 580xx driver + suspend/resume services + nvidia-container-toolkit + CDI spec at /etc/cdi/nvidia.yaml      Podman + Distrobox — primary container engines      Docker (optional, only if you need Swarm)      Snapper + grub-btrfs      RPM Fusion media codecs (ffmpeg, GStreamer plugins, libva-nvidia-driver)      KDE crypto tools (gnupg2, kgpg, kleopatra, pinentry-qt, kwalletmanager5, qgpgme)      PDF signing (okular, nss-tools, poppler-utils, optionally pcsc-lite/opensc for smartcards)      Virtualization (qemu-kvm, libvirt, virt-manager, edk2-ovmf, swtpm)      That’s it. Everything else is Brew, Flatpak, or inside Distrobox containers.      DNF Automatic Security UpdatesLet the host self-patch overnight so security updates don’t pile up. Fedora 44 uses DNF5, so the package and timer names differ from older guides — use these.  Install the DNF5 automatic plugin:    sudo dnf install -y dnf5-plugin-automatic        Copy the default config so future package updates don’t clobber your edits:    sudo cp /usr/share/dnf5/dnf5-plugins/automatic.conf /etc/dnf/automatic.conf        Edit /etc/dnf/automatic.conf:    [commands]upgrade_type = security        # Security updates only — safer for a workstationrandom_sleep = 0network_online_timeout = 60download_updates = yesapply_updates = yesreboot = never                 # Don't auto-reboot a workstation; you decide when  [emitters]emit_via = stdio               # Logs to journalctl  [base]debuglevel = 1              chezmoi note: /etc/dnf/automatic.conf is a system path — chezmoi only manages $HOME. The make phase6-dnf-automatic target creates this file idempotently; put any customisations in scripts/dnf-automatic.sh instead.        Notes:          upgrade_type = security is safer than default (all updates). For a workstation, you want security patches automated but feature updates done deliberately.      reboot = never is critical for a workstation. The default when-needed would reboot you mid-work. If this were a server, when-needed would be the right choice.        Enable and start the timer:    sudo systemctl enable --now dnf5-automatic.timer        (Optional) Adjust the schedule — default is daily. To run at 03:00 with a random delay:    sudo systemctl edit dnf5-automatic.timer        Add:    [Timer]OnCalendar=*-*-* 03:00RandomizedDelaySec=60m              chezmoi note: Timer overrides live under /etc/systemd/ — not $HOME. Track the override in ~/setup/scripts/ and apply it via a Makefile target if you want it reproducible.        Verify it’s scheduled and check status:    systemctl list-timers '*dnf*'systemctl status dnf5-automatic.timer  # Manual dry run (won't install, just shows what would happen):sudo dnf5-automatic --download-updates=no --apply-updates=no  # Review what was installed historically:journalctl -u dnf5-automatic.service --since \"1 week ago\"        Pin the NVIDIA driver to prevent automatic security updates from pulling a newer branch that your GPU doesn’t support. This applies if you installed a legacy branch (akmod-nvidia-580xx). Skip this step if you installed the current akmod-nvidia package (GTX 16xx / RTX series and newer — the current branch is always safe to update):    sudo dnf versionlock add akmod-nvidia-580xx xorg-x11-drv-nvidia-580xx*        Create a personal rule: “If it’s not a driver or system service, it doesn’t go on the host.”The dnf Guard TrickHabits are hard to enforce by willpower alone. Install a friendly speed-bump that catches casual dnf use — both dnf install foo and sudo dnf install foo — while letting automation (dnf-automatic, akmod rebuilds, PackageKit) keep working.How it works: Place a wrapper at /usr/local/bin/dnf that intercepts interactive use, prints a warning, and refuses. Provide an explicit dnf-host escape hatch for when you really mean it. System services call /usr/bin/dnf5-automatic or DNF libraries directly, so they’re unaffected.  Verify /usr/local/bin is in sudo’s secure_path (Fedora default):    sudo grep secure_path /etc/sudoers# Should include /usr/local/bin — if not, add it via `sudo visudo`        Create the guard wrapper:    sudo tee /usr/local/bin/dnf &gt; /dev/null &lt;&lt; 'EOF'#!/bin/bash# Host dnf guard — discourages casual dnf use# Allow non-interactive callers (cron, systemd services) to pass throughif [ ! -t 0 ] || [ ! -t 1 ]; then  exec /usr/bin/dnf \"$@\"ficat &lt;&lt; 'WARNING'⚠️  Hold on. You're about to run dnf on the host.This workstation is set up as an \"immutable-like\" environment.Most installs should NOT touch the host.  Did you consider:  • brew install &lt;pkg&gt;        — CLI tools  • flatpak install &lt;app&gt;     — GUI apps  • distrobox enter dev       — dev libraries (gcc, python-dev, etc.)  • podman run ...            — services and GPU workloadsIf you really mean to modify the host, use:  $ sudo dnf-host &lt;command&gt;WARNINGexit 1EOFsudo chmod +x /usr/local/bin/dnf              chezmoi note: /usr/local/bin/dnf and /usr/local/bin/dnf-host are system paths — not $HOME. They are created by make phase6-dnf-guard and will be re-created by host-setup.sh on a fresh install.        Create the explicit escape hatch:    sudo tee /usr/local/bin/dnf-host &gt; /dev/null &lt;&lt; 'EOF'#!/bin/bash# Explicit \"I really mean it\" dnf — thin wrapper around /usr/bin/dnfecho \"🔧 Running dnf on the host: $*\"exec /usr/bin/dnf \"$@\"EOFsudo chmod +x /usr/local/bin/dnf-host        Test it:    sudo dnf install vim         # Should print the warning and refusesudo dnf-host install vim    # Should actually install        (Optional) Add a zsh hint when you type dnf so you remember the escape hatch:    # In ~/.zshrcalias dnf-help='echo \"Use: sudo dnf-host &lt;cmd&gt;  (or brew/flatpak/distrobox)\"'      What this does NOT break:  dnf5-automatic.timer → calls /usr/bin/dnf5-automatic directly, unaffected  Akmod rebuilds → use DNF libraries, not the CLI  PackageKit (Discover) → uses DNF libraries via D-Bus, unaffectedOptional Level 2 — Block AUR-style repos: Make /etc/yum.repos.d/ immutable so accidentally-added repos can’t load:sudo chattr +i /etc/yum.repos.d/*.repo# To modify later: sudo chattr -i /etc/yum.repos.d/*.repo(Skip this if you regularly add COPR repos — it’s overkill for most workflows.)Phase 7: Dotfiles &amp; Reproducibility  Make: make phase7-all (phase7-brewfile-dump + phase7-host-setup) · make phase7-verify — no target: chezmoi init (interactive)Make your entire setup reproducible so you can rebuild from scratch.  Use chezmoi (install via Brew) to manage dotfiles:    brew install chezmoichezmoi init --apply &lt;your-github-username&gt;        Track these in your dotfiles repo:          ~/.zshrc, ~/.zsh_aliases, ~/.zsh_functions      ~/.tmux.conf      ~/.config/nvim/ (Neovim config)      ~/.gitconfig, ~/.gitignore_global      ~/.ssh/config (NOT private keys — manage separately)      ~/.gdbinit and any GDB scripts      ~/.config/distrobox/distrobox.conf      ~/Brewfile      ~/setup/Makefile + ~/setup/scripts/ (automation — make help)      VS Code: vscode-extensions.txt (export with code --list-extensions)      Cursor: vscode-extensions.txt (export with code --list-extensions)      ~/setup/scripts/host-setup.sh (the orchestration script — run phases 1–6 on a fresh install; created in the step below)      What to Back Up (Beyond Dotfiles)Chezmoi covers config-as-code. Other things need their own backup strategy:Goes in chezmoi (already covered):  Shell config, editor config, git config, ssh config, GDB scripts  Tool inventories (Brewfile, distrobox.ini, vscode-extensions.txt, host-setup.sh)Goes in a private repo or encrypted backup (not chezmoi public):  SSH private keys (~/.ssh/id_*)  GPG private keys → export with gpg --export-secret-keys --armor  Browser bookmarks/passwords → handled by Proton Pass + Vivaldi sync  Authenticator app seeds → Proton Pass also handles TOTPGoes in Nextcloud / Proton Drive / similar sync:  ~/Documents, ~/Pictures, project working directories  Joplin notes (set Joplin sync target to Nextcloud or its own E2E sync)  Anything you’d care about losingHas its own native sync:  KWallet — this is a system secrets service (like macOS Keychain), not a password manager. It stores app tokens, WiFi/VPN credentials, and browser session data written into it automatically by apps. There is no clean bulk export path to Proton Pass, nor is one needed: app credentials re-populate when you log back into each app on a new machine. For passwords you want across devices, add them to Proton Pass directly. If you have manually-saved entries in KWallet Manager, you can inspect them with kwallet-query -l kdewallet and export individual entries with kwallet-query -r &lt;folder&gt; -e &lt;entry&gt; kdewallet — these are rare in practice.  Browser data → Vivaldi Sync or Firefox SyncBtrfs snapshots (Snapper) handle:  Recovery from broken updates  “Undo last dnf transaction” scenarios  NOT a backup — same disk. Don’t rely on snapshots for hardware failure.For real backups (off-machine):  An external drive with restic or borgbackup (both via Brew) snapshotting ~ weekly  Or rsync to a NAS / second machine      Test restore at least once — untested backups don’t count    Create a Brewfile for reproducible Brew installs:          Make: make phase7-brewfile-dump      brew bundle dump --file=~/Brewfile# To restore on a new machine:brew bundle install --file=~/Brewfile              The orchestration script ~/setup/scripts/host-setup.sh runs all phases 1–6 in order. Add it to chezmoi so a fresh install starts with:    # Run all phases 1–6 in one shotbash ~/setup/scripts/host-setup.sh# Or resume from a specific phase (if a previous run was interrupted)bash ~/setup/scripts/host-setup.sh --from 3b              Make: make phase7-host-setup (marks the script executable)      Quick Reference: Where to Install What            What      Where      Tool                  SSH server (sshd, firewalld)      Host (dnf)      One-time              Debug tools (gdb, perf, strace)      Host (dnf)      One-time              NVIDIA driver + CDI spec      Host (dnf)      One-time              Podman (primary engine)      Host (dnf if missing)      One-time              Distrobox (dev launcher)      Homebrew or host dnf      One-time              Docker (Swarm only, optional)      Host (dnf)      One-time              Snapper, btrfs-assistant
